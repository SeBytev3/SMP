services:
  db:
    image: postgres:14-alpine
    container_name: services-marketplace-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-services_marketplace}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: services-marketplace-backend
    restart: always
    command: npm run dev
    ports:
      - "${PORT:-4000}:4000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-services_marketplace}?schema=public
      PORT: ${PORT:-4000}
      NODE_ENV: development
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-replace-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_COOKIE_EXPIRATION: ${JWT_COOKIE_EXPIRATION:-7}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@marketplace.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin123!}
    depends_on:
      - db
    volumes:
      - ./server:/app
      - /app/node_modules
      - /app/dist

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: services-marketplace-client
    restart: always
    command: npm run dev
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:4000/api
    depends_on:
      - backend
    volumes:
      - ./client:/app
      - /app/node_modules

volumes:
  postgres_data:
